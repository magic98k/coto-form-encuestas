<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta Coto</title>

<style>
/* Base infalible para evitar desbordes y márgenes raros en mobile */
* { box-sizing: border-box; }
html, body { width: 100%; overflow-x: hidden; }

body {
  margin: 0;
  background: #f0f0f0;
  font-family: Arial, sans-serif;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;

  /* ✅ Márgenes laterales simétricos siempre */
  padding: 30px 16px;
}

.logo {
  margin-bottom: 18px;
}

.logo img {
  display: block;
  max-width: 220px;
  width: 100%;
  height: auto;
  margin: 0 auto;
}

.card {
  background: #ffffff;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);

  /* ✅ Ocupa el ancho disponible del container (que ya tiene padding simétrico) */
  width: 100%;
  max-width: 480px;

  text-align: center;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
}

input[type="text"],
textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

/* Estrellas */
.rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: center;
  gap: 6px;
}

.rating input {
  display: none;
}

.rating label {
  font-size: 40px;
  color: #bdbdbd;
  cursor: pointer;
  transition: 0.2s;
}

.rating input:checked ~ label,
.rating label:hover,
.rating label:hover ~ label {
  color: #ff0000;
}

button {
  background: #ff0000;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
  width: 100%;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  font-size: 15px;
}

button:hover {
  background: #cc0000;
  transform: scale(1.02);
}

/* MOBILE OPTIMIZADO */
@media (max-width: 480px) {
  .container {
    padding: 20px 16px; /* ✅ mantiene 16px por lado */
  }

  .logo {
    margin-bottom: 14px;
  }

  .logo img {
    max-width: 160px;
  }

  .card {
    padding: 18px;
    border-radius: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .rating label {
    font-size: 30px;
  }

  textarea {
    min-height: 80px;
  }

  button {
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="logo">
    <img src="./Logo_Coto_PNG.png" alt="Coto">
  </div>

  <div class="card">

    <form action="https://coto--uat.sandbox.my.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DV9000004wUEj" method="POST">

      <input type="hidden" name="orgid" value="00DV9000004wUEj">
      <input type="hidden" name="retURL" value="https://coto.com.ar/">
      <input type="hidden" name="subject" value="Encuesta de sucursales (Web)">
      <input type="hidden" name="origin" value="Web">
      <input type="hidden" name="priority" value="Bajo">
      <input type="hidden" name="status" value="Abierto">
      <input type="hidden" name="external" value="1">

      <!-- Sucursal -->
      <div class="form-group">
        <label>¿En qué sucursal estuviste?</label>
        <input
          type="text"
          name="00NV900000535Q5"
          list="sucursales"
          placeholder="Escribí para buscar..."
          required>
        <datalist id="sucursales">
          <option value="Abasto">
          <option value="Tortugas">
          <option value="Garín">
          <option value="Escobar">
        </datalist>
      </div>

      <!-- Calificación -->
      <div class="form-group">
        <label>¿Cómo calificás nuestro servicio?</label>
        <div class="rating">
          <input type="radio" id="star5" name="00NV900000536Z3" value="5" required>
          <label for="star5">★</label>

          <input type="radio" id="star4" name="00NV900000536Z3" value="4">
          <label for="star4">★</label>

          <input type="radio" id="star3" name="00NV900000536Z3" value="3">
          <label for="star3">★</label>

          <input type="radio" id="star2" name="00NV900000536Z3" value="2">
          <label for="star2">★</label>

          <input type="radio" id="star1" name="00NV900000536Z3" value="1">
          <label for="star1">★</label>
        </div>
      </div>

      <!-- Comentarios -->
      <div class="form-group">
        <label>Dejanos tus comentarios</label>
        <textarea name="00NV900000536vd" maxlength="1000"></textarea>
      </div>

      <button type="submit">Enviar</button>

    </form>

  </div>
</div>

</body>
</html>
